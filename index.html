<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz DAW - Final</title>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            /* Usamos el nuevo nombre del archivo */
            background-image: url('img.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #333; /* Color de respaldo por si tarda en cargar */
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            /* Fondo blanco con transparencia para ver la foto detrás */
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        header { 
            height: 8vh; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 1.2rem; 
            border-bottom: 1px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.6);
        }

        main { flex: 1; padding: 1.2rem; overflow-y: auto; display: flex; flex-direction: column; }
        .view { display: none; flex-direction: column; width: 100%; animation: fadeIn 0.2s ease; }
        .view.active { display: flex; }
        h1 { font-size: 1.3rem; margin-bottom: 1.2rem; }
        .options-grid { display: grid; gap: 0.7rem; width: 100%; }

        .btn-option { 
            background: white; 
            border: 2px solid #e2e8f0; 
            padding: 1rem; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            text-align: left; 
            cursor: pointer; 
            transition: 0.2s; 
            line-height: 1.3; 
        }

        .btn-option.correct { border-color: var(--success); background-color: #f0fdf4; color: #166534; font-weight: 600; }
        .btn-option.wrong { border-color: var(--error); background-color: #fef2f2; color: #991b1b; }

        #explanation-drawer { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: #f1f5f9; padding: 1.5rem; 
            border-top: 4px solid var(--primary); 
            transform: translateY(100%); transition: 0.3s ease; 
            z-index: 20; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
        }

        #explanation-drawer.show { transform: translateY(0); }
        .btn-next { width: 100%; padding: 1rem; margin-top: 1rem; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading { text-align: center; margin-top: 2rem; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <strong onclick="location.reload()" style="cursor:pointer">Quiz DAW</strong>
            <span id="progress-counter" style="color: var(--primary); font-weight: bold;"></span>
        </header>
        <main>
            <div id="loading-msg" class="loading">Cargando preguntas...</div>
            <section id="view-home" class="view">
                <h1>Elige un módulo para estudiar:</h1>
                <div id="subjects-menu" class="options-grid"></div>
            </section>
            <section id="view-test" class="view">
                <p id="enunciado" style="font-weight: 600; margin-bottom: 1.2rem; line-height: 1.4; font-size: 1.1rem;"></p>
                <div id="options-list" class="options-grid"></div>
            </section>
            <section id="view-results" class="view">
                <h1>Resultados</h1>
                <div id="score-display" style="text-align: center; font-size: 3rem; font-weight: 800; margin: 1rem 0;"></div>
                <button class="btn-next" onclick="location.reload()">Cambiar de módulo</button>
            </section>
        </main>
        <div id="explanation-drawer">
            <h3 style="color: var(--primary)">💡 Respuesta correcta</h3>
            <p id="explanation-text" style="margin: 0.8rem 0; font-size: 0.9rem; line-height: 1.4;"></p>
            <button class="btn-next" onclick="nextQuestion()">Siguiente Pregunta</button>
        </div>
    </div>

    <script>
        let rawData = [];
        let state = { questions: [], currentIdx: 0, score: 0, subject: '' };

        async function loadQuestions() {
            try {
                const response = await fetch('preguntas.json');
                if (!response.ok) throw new Error();
                rawData = await response.json();
                document.getElementById('loading-msg').style.display = 'none';
                initMenu();
                showView('view-home');
            } catch (error) {
                document.getElementById('loading-msg').innerHTML = "⚠️ Sube el archivo preguntas.json a GitHub";
            }
        }

        function initMenu() {
            const subjects = [...new Set(rawData.map(q => q.asignatura))];
            document.getElementById('subjects-menu').innerHTML = subjects.map(s => `
                <button class="btn-option" onclick="startTest('${s}')">
                    <strong>${s.replace(/_/g, ' ')}</strong>
                </button>
            `).join('');
        }

        function startTest(subject) {
            state.subject = subject;
            state.questions = rawData.filter(q => q.asignatura === subject).sort(() => Math.random() - 0.5);
            state.currentIdx = 0; state.score = 0;
            showView('view-test'); renderQuestion();
        }

        function renderQuestion() {
            const q = state.questions[state.currentIdx];
            document.getElementById('progress-counter').innerText = `${state.currentIdx + 1}/${state.questions.length}`;
            document.getElementById('enunciado').innerText = q.enunciado;
            document.getElementById('options-list').innerHTML = q.opciones.map(opt => `
                <button class="btn-option" onclick="handleSelect('${opt.letra}')" data-letra="${opt.letra}">
                    <strong>${opt.letra})</strong> ${opt.texto}
                </button>
            `).join('');
            document.getElementById('explanation-drawer').classList.remove('show');
        }

        function handleSelect(letra) {
            const q = state.questions[state.currentIdx];
            const btns = document.querySelectorAll('.btn-option');
            const isCorrect = (letra === q.respuesta_correcta);
            btns.forEach(b => {
                b.onclick = null;
                if(b.dataset.letra === q.respuesta_correcta) b.classList.add('correct');
                if(b.dataset.letra === letra && !isCorrect) b.classList.add('wrong');
            });
            if(isCorrect) state.score++;
            document.getElementById('explanation-text').innerText = q.explicacion;
            document.getElementById('explanation-drawer').classList.add('show');
        }

        function nextQuestion() {
            state.currentIdx++;
            if(state.currentIdx < state.questions.length) renderQuestion();
            else finish();
        }

        function finish() {
            showView('view-results');
            document.getElementById('progress-counter').innerText = "";
            document.getElementById('score-display').innerText = `${state.score} / ${state.questions.length}`;
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        loadQuestions();
    </script>
</body>
</html>
